# ============================================================
# Nginx Reverse Proxy — главный вход TrackerGPS
# Порт 80: маршрутизация запросов на вебки и API
# ============================================================

upstream web_frontend {
    server web-frontend:80;
}

upstream web_billing {
    server web-billing:80;
}

upstream device_manager_api {
    server device-manager:8082;
}

server {
    listen 80;
    server_name _;

    # Gzip
    gzip on;
    gzip_types text/plain text/css application/json application/javascript text/xml application/xml text/javascript image/svg+xml;
    gzip_min_length 256;

    # Ограничение размера тела запроса
    client_max_body_size 10M;

    # ============================================================
    # /admin — админка (web-billing)
    # ============================================================
    location /admin/ {
        proxy_pass http://web_billing/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;
    }

    # ============================================================
    # /api — REST API (Device Manager)
    # ============================================================
    location /api/ {
        proxy_pass http://device_manager_api/api/;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # Таймаут для длинных запросов
        proxy_read_timeout 60s;
        proxy_connect_timeout 10s;
    }

    # ============================================================
    # / — пользовательская панель (web-frontend, по умолчанию)
    # ============================================================
    location / {
        proxy_pass http://web_frontend;
        proxy_http_version 1.1;
        proxy_set_header Host $host;
        proxy_set_header X-Real-IP $remote_addr;
        proxy_set_header X-Forwarded-For $proxy_add_x_forwarded_for;
        proxy_set_header X-Forwarded-Proto $scheme;

        # WebSocket support
        proxy_set_header Upgrade $http_upgrade;
        proxy_set_header Connection "upgrade";
        proxy_read_timeout 86400;
    }

    # Health check для самого прокси
    location /health {
        return 200 'OK';
        add_header Content-Type text/plain;
    }
}

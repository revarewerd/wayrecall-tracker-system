# ============================================================
# Grafana Dashboard Provisioning
# Автоматическая загрузка дашбордов из json-файлов
# ============================================================

apiVersion: 1

providers:
  - name: 'Wayrecall Tracker'
    orgId: 1
    folder: 'Tracker'
    type: file
    disableDeletion: false
    editable: true
    updateIntervalSeconds: 30
    allowUiUpdates: true
    options:
      path: /etc/grafana/provisioning/dashboards
      foldersFromFilesStructure: false

version: '3.8'

services:
  redis:
    image: redis:7-alpine
    container_name: tracker-redis
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tracker-network

  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tracker-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://192.168.1.5:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - tracker-network

  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: tracker-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - tracker-network

  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: tracker-timescaledb
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker123
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgresql/init-docker.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tracker-network

  # ============================================================
  # Device Manager - REST API
  # ============================================================
  
  device-manager:
    image: eclipse-temurin:21-jre-jammy
    container_name: tracker-device-manager
    depends_on:
      - timescaledb
      - kafka
      - redis
    ports:
      - "8092:8082"
    volumes:
      - ./device-manager.jar:/app/device-manager.jar:ro
    working_dir: /app
    entrypoint: ["java", "-Xms512m", "-Xmx1g", "-XX:+UseG1GC", "-jar", "device-manager.jar"]
    environment:
      APP_HTTP_PORT: "8082"
      APP_DATABASE_HOST: "timescaledb"
      APP_DATABASE_PORT: "5432"
      APP_DATABASE_NAME: "tracker"
      APP_DATABASE_USERNAME: "tracker"
      APP_DATABASE_PASSWORD: "tracker123"
      APP_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      APP_REDIS_HOST: "redis"
      APP_REDIS_PORT: "6379"
    networks:
      - tracker-network
    restart: unless-stopped

  # ============================================================
  # History Writer - Kafka -> TimescaleDB
  # ============================================================
  
  history-writer:
    image: eclipse-temurin:21-jre-jammy
    container_name: tracker-history-writer
    depends_on:
      - timescaledb
      - kafka
    ports:
      - "8093:8083"
    volumes:
      - ./history-writer-1.0.0.jar:/app/history-writer.jar:ro
    working_dir: /app
    entrypoint: ["java", "-Xms512m", "-Xmx2g", "-XX:+UseG1GC", "-jar", "history-writer.jar"]
    environment:
      APP_HTTP_PORT: "8083"
      APP_DATABASE_HOST: "timescaledb"
      APP_DATABASE_PORT: "5432"
      APP_DATABASE_NAME: "tracker"
      APP_DATABASE_USERNAME: "tracker"
      APP_DATABASE_PASSWORD: "tracker123"
      APP_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      APP_BATCH_MAX_SIZE: "500"
      APP_BATCH_FLUSH_INTERVAL_MS: "5000"
    networks:
      - tracker-network
    restart: unless-stopped

volumes:
  redis-data:
  pgdata:

networks:
  tracker-network:
    driver: bridge

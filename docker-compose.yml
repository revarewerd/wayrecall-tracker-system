version: '3.8'

services:
  # Redis - кэш, очереди команд, конфиг
  redis:
    image: redis:7-alpine
    container_name: tracker-redis
    ports:
      - "16379:6379"
    volumes:
      - redis-data:/data
    command: redis-server --appendonly yes
    healthcheck:
      test: ["CMD", "redis-cli", "ping"]
      interval: 5s
      timeout: 3s
      retries: 5
    networks:
      - tracker-network

  # Kafka - Event streaming
  kafka:
    image: confluentinc/cp-kafka:7.5.0
    container_name: tracker-kafka
    ports:
      - "9092:9092"
      - "29092:29092"
    environment:
      KAFKA_BROKER_ID: 1
      KAFKA_ZOOKEEPER_CONNECT: zookeeper:2181
      KAFKA_ADVERTISED_LISTENERS: PLAINTEXT://kafka:29092,PLAINTEXT_HOST://localhost:9092
      KAFKA_LISTENER_SECURITY_PROTOCOL_MAP: PLAINTEXT:PLAINTEXT,PLAINTEXT_HOST:PLAINTEXT
      KAFKA_INTER_BROKER_LISTENER_NAME: PLAINTEXT
      KAFKA_OFFSETS_TOPIC_REPLICATION_FACTOR: 1
      KAFKA_AUTO_CREATE_TOPICS_ENABLE: "true"
    depends_on:
      - zookeeper
    healthcheck:
      test: ["CMD", "kafka-broker-api-versions", "--bootstrap-server", "localhost:9092"]
      interval: 5s
      timeout: 10s
      retries: 5
    networks:
      - tracker-network

  # ZooKeeper - для Kafka
  zookeeper:
    image: confluentinc/cp-zookeeper:7.5.0
    container_name: tracker-zookeeper
    environment:
      ZOOKEEPER_CLIENT_PORT: 2181
      ZOOKEEPER_TICK_TIME: 2000
    ports:
      - "2181:2181"
    networks:
      - tracker-network

  # TimescaleDB - GPS история
  timescaledb:
    image: timescale/timescaledb:latest-pg16
    container_name: tracker-timescaledb
    ports:
      - "15432:5432"
    environment:
      POSTGRES_DB: tracker
      POSTGRES_USER: tracker
      POSTGRES_PASSWORD: tracker123
      POSTGRES_INITDB_ARGS: "-c max_connections=200 -c shared_buffers=256MB"
    volumes:
      - pgdata:/var/lib/postgresql/data
      - ./infra/postgresql/init-docker.sql:/docker-entrypoint-initdb.d/01-init.sql
    healthcheck:
      test: ["CMD-SHELL", "pg_isready -U tracker"]
      interval: 5s
      timeout: 5s
      retries: 5
    networks:
      - tracker-network

  # ============================================================
  # Connection Manager - 4 экземпляра на разных протоколах
  # ============================================================
  
  connection-manager-teltonika:
    build:
      context: ./services/connection-manager
      dockerfile: Dockerfile
    container_name: tracker-cm-teltonika
    depends_on:
      - kafka
      - redis
    ports:
      - "5001:5001"
      - "8081:8080"
    environment:
      INSTANCE_ID: "cm-instance-1"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      TCP_ENABLED_PROTOCOLS: "teltonika"
    networks:
      - tracker-network
    restart: unless-stopped
  
  connection-manager-wialon:
    build:
      context: ./services/connection-manager
      dockerfile: Dockerfile
    container_name: tracker-cm-wialon
    depends_on:
      - kafka
      - redis
    ports:
      - "5002:5002"
      - "8082:8080"
    environment:
      INSTANCE_ID: "cm-instance-2"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      TCP_ENABLED_PROTOCOLS: "wialon"
    networks:
      - tracker-network
    restart: unless-stopped
  
  connection-manager-ruptela:
    build:
      context: ./services/connection-manager
      dockerfile: Dockerfile
    container_name: tracker-cm-ruptela
    depends_on:
      - kafka
      - redis
    ports:
      - "5003:5003"
      - "8083:8080"
    environment:
      INSTANCE_ID: "cm-instance-3"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      TCP_ENABLED_PROTOCOLS: "ruptela"
    networks:
      - tracker-network
    restart: unless-stopped
  
  connection-manager-navtelecom:
    build:
      context: ./services/connection-manager
      dockerfile: Dockerfile
    container_name: tracker-cm-navtelecom
    depends_on:
      - kafka
      - redis
    ports:
      - "5004:5004"
      - "8084:8080"
    environment:
      INSTANCE_ID: "cm-instance-4"
      REDIS_HOST: "redis"
      REDIS_PORT: "6379"
      KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      TCP_ENABLED_PROTOCOLS: "navtelecom"
    networks:
      - tracker-network
    restart: unless-stopped
  
  # ============================================================
  # Device Manager - REST API для управления устройствами
  # ============================================================
  
  device-manager:
    build:
      context: ./services/device-manager
      dockerfile: Dockerfile
    container_name: tracker-device-manager
    depends_on:
      - timescaledb
      - kafka
      - redis
    ports:
      - "8092:8082"
    environment:
      APP_HTTP_PORT: "8082"
      APP_DATABASE_HOST: "timescaledb"
      APP_DATABASE_PORT: "5432"
      APP_DATABASE_NAME: "tracker"
      APP_DATABASE_USERNAME: "tracker"
      APP_DATABASE_PASSWORD: "tracker123"
      APP_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      APP_REDIS_HOST: "redis"
      APP_REDIS_PORT: "6379"
    networks:
      - tracker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8082/health"]
      interval: 30s
      timeout: 5s
      retries: 3
  
  # ============================================================
  # History Writer - Запись GPS событий в TimescaleDB
  # ============================================================
  
  history-writer:
    build:
      context: ./services/history-writer
      dockerfile: Dockerfile
    container_name: tracker-history-writer
    depends_on:
      - timescaledb
      - kafka
    ports:
      - "8093:8083"
    environment:
      APP_HTTP_PORT: "8083"
      APP_DATABASE_HOST: "timescaledb"
      APP_DATABASE_PORT: "5432"
      APP_DATABASE_NAME: "tracker"
      APP_DATABASE_USERNAME: "tracker"
      APP_DATABASE_PASSWORD: "tracker123"
      APP_KAFKA_BOOTSTRAP_SERVERS: "kafka:29092"
      APP_BATCH_MAX_SIZE: "500"
      APP_BATCH_FLUSH_INTERVAL_MS: "5000"
    networks:
      - tracker-network
    restart: unless-stopped
    healthcheck:
      test: ["CMD", "curl", "-f", "http://localhost:8083/health"]
      interval: 30s
      timeout: 5s
      retries: 3

volumes:
  redis-data:
  pgdata:

networks:
  tracker-network:
    driver: bridge
